<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 620" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#444"/>
    </marker>
    <marker id="arrowO" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#d9534f"/>
    </marker>
  </defs>

  <!-- Input -->
  <rect x="255" y="12" width="320" height="42" rx="6" fill="#eef2f7" stroke="#5f6b7a" stroke-width="1.5"/>
  <text x="415" y="33" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">Nielsen scanner panel</text>
  <text x="415" y="48" text-anchor="middle" font-size="11" fill="#555">DVH EXCL. HD · brand × month (Chapter 4)</text>
  <line x1="415" y1="54" x2="415" y2="92" stroke="#444" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- Coordinator container -->
  <rect x="30" y="92" width="560" height="436" rx="10" fill="#fafafa" stroke="#888" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="46" y="112" font-size="12.5" font-weight="bold" fill="#555">Lightweight Python coordinator — typed state between layers</text>
  <text x="46" y="128" font-size="11" fill="#777">≤ 8 GB RAM · one model resident at a time · LLM kept out-of-process (remote API)</text>

  <!-- Layer 1: substrate -->
  <rect x="56" y="140" width="508" height="96" rx="8" fill="#e8f0fe" stroke="#4285c7" stroke-width="1.6"/>
  <text x="70" y="160" font-size="13" font-weight="bold" fill="#1a4f8a">1 · Forecasting substrate (SRQ1 — Chapter 6)</text>
  <g font-size="11.5" fill="#1a4f8a">
    <rect x="70"  y="172" width="86" height="46" rx="5" fill="#ffffff" stroke="#4285c7"/><text x="113" y="192" text-anchor="middle">ARIMA</text><text x="113" y="207" text-anchor="middle" font-size="9.5" fill="#666">statistical</text>
    <rect x="166" y="172" width="86" height="46" rx="5" fill="#ffffff" stroke="#4285c7"/><text x="209" y="192" text-anchor="middle">Prophet</text><text x="209" y="207" text-anchor="middle" font-size="9.5" fill="#666">statistical</text>
    <rect x="262" y="172" width="86" height="46" rx="5" fill="#ffffff" stroke="#4285c7"/><text x="305" y="192" text-anchor="middle">LightGBM</text><text x="305" y="207" text-anchor="middle" font-size="9.5" fill="#666">boosting</text>
    <rect x="358" y="172" width="86" height="46" rx="5" fill="#ffffff" stroke="#4285c7"/><text x="401" y="192" text-anchor="middle">XGBoost</text><text x="401" y="207" text-anchor="middle" font-size="9.5" fill="#666">boosting</text>
    <rect x="454" y="172" width="96" height="46" rx="5" fill="#ffffff" stroke="#4285c7"/><text x="502" y="192" text-anchor="middle">Ridge</text><text x="502" y="207" text-anchor="middle" font-size="9.5" fill="#666">linear</text>
  </g>

  <line x1="310" y1="236" x2="310" y2="268" stroke="#444" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="320" y="256" font-size="10.5" fill="#555">point forecast + 90% interval</text>

  <!-- Layer 2: interface -->
  <rect x="56" y="270" width="508" height="84" rx="8" fill="#fff4e5" stroke="#e89c3c" stroke-width="1.6"/>
  <text x="70" y="290" font-size="13" font-weight="bold" fill="#9a6212">2 · Structured forecast-tool interface (SRQ2)</text>
  <text x="70" y="307" font-size="11" fill="#7a5a2a">JSON function-calling · strict output schema</text>
  <g font-size="11" fill="#7a5a2a">
    <rect x="70"  y="318" width="150" height="26" rx="13" fill="#ffffff" stroke="#e89c3c"/><text x="145" y="335" text-anchor="middle">reliability (validated)</text>
    <rect x="228" y="318" width="150" height="26" rx="13" fill="#ffffff" stroke="#e89c3c"/><text x="303" y="335" text-anchor="middle">uncertainty (interval)</text>
    <rect x="386" y="318" width="166" height="26" rx="13" fill="#ffffff" stroke="#e89c3c"/><text x="469" y="335" text-anchor="middle">traceability (audit trail)</text>
  </g>

  <line x1="310" y1="354" x2="310" y2="386" stroke="#444" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="320" y="374" font-size="10.5" fill="#555">validated tool call / response</text>

  <!-- Layer 3: agentic -->
  <rect x="56" y="388" width="508" height="92" rx="8" fill="#e9f7ef" stroke="#34a853" stroke-width="1.6"/>
  <text x="70" y="408" font-size="13" font-weight="bold" fill="#1e7e44">3 · Bounded tool-using agentic layer (informs SRQ3)</text>
  <text x="70" y="426" font-size="11" fill="#2a6b40">LLM orchestrator via remote API · temperature 0 · delegation over generation</text>
  <text x="70" y="443" font-size="11" fill="#2a6b40">human-in-the-loop checkpoints · validates agent numbers against source forecast</text>
  <text x="70" y="465" font-size="10.5" font-style="italic" fill="#558">Production target (not evaluated): Prometheus Graph Engine · LangGraph deployment</text>

  <!-- Output -->
  <line x1="310" y1="528" x2="310" y2="556" stroke="#444" stroke-width="1.6" marker-end="url(#arrow)"/>
  <rect x="150" y="558" width="320" height="44" rx="6" fill="#ede7f6" stroke="#7e57c2" stroke-width="1.6"/>
  <text x="310" y="580" text-anchor="middle" font-size="13" font-weight="bold" fill="#4527a0">Confidence-qualified recommendation</text>
  <text x="310" y="595" text-anchor="middle" font-size="10.5" fill="#666">auditable back to its source forecast</text>

  <!-- Code-as-action baseline -->
  <rect x="620" y="270" width="196" height="210" rx="10" fill="#fdecea" stroke="#d9534f" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="718" y="292" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#a8332b">Code-as-action</text>
  <text x="718" y="308" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#a8332b">LLM baseline</text>
  <text x="718" y="326" text-anchor="middle" font-size="10.5" fill="#8a4540">(SRQ4 comparator)</text>
  <text x="630" y="350" font-size="10.5" fill="#6a3a36">same base LLM,</text>
  <text x="630" y="366" font-size="10.5" fill="#6a3a36">same data &amp; prompts</text>
  <text x="630" y="388" font-size="10.5" fill="#6a3a36">writes · executes ·</text>
  <text x="630" y="404" font-size="10.5" fill="#6a3a36">self-corrects own code</text>
  <text x="630" y="426" font-size="10.5" fill="#6a3a36">sandbox (e.g. E2B);</text>
  <text x="630" y="442" font-size="10.5" fill="#6a3a36">no dedicated model</text>

  <!-- comparison arrow -->
  <line x1="590" y1="375" x2="618" y2="375" stroke="#d9534f" stroke-width="1.6" marker-end="url(#arrowO)"/>
  <line x1="618" y1="395" x2="592" y2="395" stroke="#d9534f" stroke-width="1.6" marker-end="url(#arrowO)"/>
  <text x="604" y="368" text-anchor="middle" font-size="9.5" fill="#a8332b">SRQ4</text>
  <text x="604" y="416" text-anchor="middle" font-size="9" fill="#a8332b">correctness ·</text>
  <text x="604" y="427" text-anchor="middle" font-size="9" fill="#a8332b">consistency ·</text>
  <text x="604" y="438" text-anchor="middle" font-size="9" fill="#a8332b">replicability ·</text>
  <text x="604" y="449" text-anchor="middle" font-size="9" fill="#a8332b">cost · latency</text>
</svg>
