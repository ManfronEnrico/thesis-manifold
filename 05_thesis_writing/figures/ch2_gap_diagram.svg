<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#6b7280"/></marker>
  </defs>
  <!-- four literature boxes -->
  <g>
    <rect x="20" y="20" width="250" height="70" rx="8" fill="#e4f1f1" stroke="#0E7C86" stroke-width="1.4"/>
    <text x="38" y="46" font-size="14" font-weight="bold" fill="#0E7C86">Forecasting / FMCG</text>
    <text x="38" y="66" font-size="11" fill="#1f2937">M4/M5, LightGBM, exogenous features</text>
    <text x="38" y="80" font-size="10" fill="#6b7280">— but no RAM budget, no agent</text>

    <rect x="550" y="20" width="250" height="70" rx="8" fill="#e4f1f1" stroke="#0E7C86" stroke-width="1.4"/>
    <text x="568" y="46" font-size="14" font-weight="bold" fill="#0E7C86">LLM agents &amp; tool use</text>
    <text x="568" y="66" font-size="11" fill="#1f2937">tools, delegation, code-as-action</text>
    <text x="568" y="80" font-size="10" fill="#6b7280">— but weak link to forecasting</text>

    <rect x="20" y="330" width="250" height="70" rx="8" fill="#e4f1f1" stroke="#0E7C86" stroke-width="1.4"/>
    <text x="38" y="356" font-size="14" font-weight="bold" fill="#0E7C86">Reliability &amp; evaluation</text>
    <text x="38" y="376" font-size="11" fill="#1f2937">hallucination, traceability, judges</text>
    <text x="38" y="390" font-size="10" fill="#6b7280">— but not the integration</text>

    <rect x="550" y="330" width="250" height="70" rx="8" fill="#e4f1f1" stroke="#0E7C86" stroke-width="1.4"/>
    <text x="568" y="356" font-size="14" font-weight="bold" fill="#0E7C86">Production agentic systems</text>
    <text x="568" y="376" font-size="11" fill="#1f2937">feasible hybrids (González-Potes)</text>
    <text x="568" y="390" font-size="10" fill="#6b7280">— but real-time industrial, not SME</text>
  </g>

  <!-- arrows to center -->
  <line x1="220" y1="92" x2="350" y2="170" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="600" y1="92" x2="470" y2="170" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="220" y1="328" x2="350" y2="250" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="600" y1="328" x2="470" y2="250" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- center gap -->
  <rect x="270" y="160" width="280" height="100" rx="12" fill="#14213D"/>
  <text x="410" y="190" text-anchor="middle" font-size="14" font-weight="bold" fill="#C8841E">THE GAP (G6)</text>
  <text x="410" y="214" text-anchor="middle" font-size="11.5" fill="#ffffff">Extend a non-predictive agentic system</text>
  <text x="410" y="230" text-anchor="middle" font-size="11.5" fill="#ffffff">with lightweight forecasting, vs a</text>
  <text x="410" y="246" text-anchor="middle" font-size="11.5" fill="#ffffff">code-as-action baseline, under 8 GB</text>
</svg>
