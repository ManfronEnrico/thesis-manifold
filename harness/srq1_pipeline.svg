<svg viewBox="0 0 680 830" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
<style>
  .lab{font-weight:600}
  .mono{font-family:ui-monospace,Menlo,Consolas,monospace}
  .gray rect{fill:#f1efe8;stroke:#b4b2a9;stroke-width:1.2}
  .gray .lab{fill:#5f5e5a} .gray .mono{fill:#2c2c2a} .gray .note{fill:#5f5e5a}
  .blue rect{fill:#e6f1fb;stroke:#85b7eb;stroke-width:1.2}
  .blue .lab{fill:#185fa5} .blue .mono{fill:#042c53} .blue .note{fill:#185fa5}
  .teal rect{fill:#e1f5ee;stroke:#5dcaa5;stroke-width:1.2}
  .teal .lab{fill:#0f6e56} .teal .mono{fill:#04342c} .teal .note{fill:#0f6e56}
  .amber rect{fill:#faeeda;stroke:#ef9f27;stroke-width:1.2}
  .amber .lab{fill:#854f0b} .amber .mono{fill:#412402} .amber .note{fill:#854f0b}
  .purple rect{fill:#eeedfe;stroke:#afa9ec;stroke-width:1.2}
  .purple .lab{fill:#534ab7} .purple .mono{fill:#26215c} .purple .note{fill:#534ab7}
</style>
<defs>
  <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
    <path d="M0,0 L9,4.5 L0,9 z" fill="#888780"/>
  </marker>
</defs>
<rect x="0" y="0" width="680" height="830" fill="#ffffff"/>

<text x="40" y="28" fill="#14171c" font-size="17" font-weight="600">SRQ1 forecasting pipeline — end to end</text>
<text x="40" y="46" fill="#59636f" font-size="11.5">ingestion → feature engineering → model training → outputs · the file used at each step</text>

<g class="gray">
  <rect x="40" y="60" width="600" height="66" rx="8"/>
  <text x="58" y="82" class="lab" font-size="12">1 · INGESTION — fetch (warehouse → JSONL)</text>
  <text x="58" y="103" class="mono" font-size="11.5">_00_raw/nielsen/scripts/save_all_datasets.py</text>
  <text x="58" y="119" class="note" font-size="11">→ _00_raw/.../data_jsonl/*.jsonl   +  MANIFEST.json</text>
</g>
<path d="M340 126 L340 146" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#ar)"/>

<g class="gray">
  <rect x="40" y="148" width="600" height="66" rx="8"/>
  <text x="58" y="170" class="lab" font-size="12">2 · CONVERT (JSONL → parquet star schema)</text>
  <text x="58" y="191" class="mono" font-size="11.5">_01_converted/nielsen/jsonl_to_parquet/convert_category.py</text>
  <text x="58" y="207" class="note" font-size="11">→ clean facts + market / product / period dims</text>
</g>
<path d="M340 214 L340 234" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#ar)"/>

<g class="gray">
  <rect x="40" y="236" width="600" height="72" rx="8"/>
  <text x="58" y="258" class="lab" font-size="12">3 · LOCAL SNAPSHOT — the frozen extract the models actually read</text>
  <text x="58" y="279" class="mono" font-size="11.5">data/raw/nielsen_&lt;cat&gt;_clean_facts_v.parquet</text>
  <text x="58" y="296" class="mono" font-size="11.5">data/raw/nielsen_&lt;cat&gt;_clean_dim_{market,product,period}.parquet</text>
</g>
<path d="M340 308 L340 328" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#ar)"/>

<g class="blue">
  <rect x="40" y="330" width="600" height="92" rx="8"/>
  <text x="58" y="352" class="lab" font-size="12">4 · FEATURE BUILD — two grains · thesis/data/preprocessing/nielsen_dvh/</text>
  <text x="58" y="373" class="mono" font-size="11.5">build_feature_matrix.py          → _03_engineered_dvhexclhd/  (brand×month)</text>
  <text x="58" y="390" class="mono" font-size="11.5">build_feature_matrix_bychain.py  → _04_engineered_bychain/    (brand×chain)</text>
  <text x="58" y="410" class="note" font-size="10.5">◂ lag / window / holiday choices come from EDA: _02_preprocessing/.../pre_csd_1.5_eda.py</text>
</g>
<path d="M340 422 L340 442" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#ar)"/>

<g class="teal">
  <rect x="40" y="444" width="600" height="92" rx="8"/>
  <text x="58" y="466" class="lab" font-size="12">5 · TRAIN + TUNE (Optuna TPE, objective = WMAPE) · scripts/</text>
  <text x="58" y="487" class="mono" font-size="11.5">srq1_benchmark_tuned.py   (tuned)     srq1_benchmark.py   (untuned 1st pass)</text>
  <text x="58" y="506" class="note" font-size="11">reads _03 + _04  →  writes _05_results_srq1/</text>
  <text x="58" y="524" class="mono" font-size="11">tuned_metrics.csv · tuned_params.json · tuned_summary.md</text>
</g>
<path d="M340 536 L340 556" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#ar)"/>

<g class="amber">
  <rect x="40" y="558" width="600" height="118" rx="8"/>
  <text x="58" y="580" class="lab" font-size="12">6 · ANALYSIS on the trained models · scripts/  (read _03/_04 → write _05)</text>
  <text x="58" y="601" class="mono" font-size="11">srq1_baselines_stat.py   → ARIMA / Prophet baselines (stat_baselines.*)</text>
  <text x="58" y="618" class="mono" font-size="11">srq1_shap.py             → feature importance (shap_importance.csv, figures/)</text>
  <text x="58" y="635" class="mono" font-size="11">srq1_calibration.py      → conformal intervals (calibration.*)</text>
  <text x="58" y="652" class="mono" font-size="11">srq1_profiling.py        → RAM / latency (profiling.*)</text>
  <text x="58" y="669" class="mono" font-size="11">srq1_figures.py          → publication figures (figures/*.png)</text>
</g>
<path d="M340 676 L340 696" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#ar)"/>

<g class="purple">
  <rect x="40" y="698" width="600" height="76" rx="8"/>
  <text x="58" y="720" class="lab" font-size="12">7 · CONSUMERS (downstream)</text>
  <text x="58" y="741" class="mono" font-size="11.5">Ch6 §6.5 (thesis prose)      scripts/forecast_service.py → System A tool (SRQ4)</text>
  <text x="58" y="759" class="note" font-size="10.5">tuned_params.json + the feature matrices back the dedicated-model agent</text>
</g>

<text x="40" y="800" class="mono" fill="#888780" font-size="10.5">note: data/raw = frozen snapshot feeding the models today (partial CSD).</text>
<text x="40" y="815" class="mono" fill="#888780" font-size="10.5">the _00_raw → _01_converted refetch (9.8M CSD) repoints stage 3 when Brian's full parquets land.</text>
</svg>
